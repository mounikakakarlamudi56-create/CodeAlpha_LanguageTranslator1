<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator</title>
</head>
<body>

    <h1>🌍 AI Language Translator</h1>

    <form action="/translate" method="POST">

        <label><b>Enter Text:</b></label><br><br>

        <textarea name="text" rows="6" cols="60" placeholder="Type your text here..."></textarea>

        <br><br>

        <label><b>From Language:</b></label><br>

        <select name="source">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
            <option value="ta">Tamil</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="mr">Marathi</option>
            <option value="bn">Bengali</option>
            <option value="gu">Gujarati</option>
            <option value="pa">Punjabi</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh-CN">Chinese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
        </select>

        <br><br>

        <label><b>To Language:</b></label><br>

        <select name="target">
            <option value="te">Telugu</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="mr">Marathi</option>
            <option value="bn">Bengali</option>
            <option value="gu">Gujarati</option>
            <option value="pa">Punjabi</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh-CN">Chinese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
        </select>

        <br><br>

        <button type="submit">Translate</button>

        <br><br>

        <label><b>Translated Text:</b></label><br><br>

        <textarea rows="6" cols="60" readonly>{{ translated_text }}</textarea>

    </form>

</body>
</html>
